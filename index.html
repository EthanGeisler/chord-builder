<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chord Builder</title>
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
  <!-- Header Controls Bar -->
  <header id="controls-bar">
    <div class="controls-left">
      <h1>Chord Builder</h1>
      <div class="control-group">
        <label for="key-select">Key</label>
        <select id="key-select"></select>
      </div>
      <div class="control-group">
        <label for="capo-select">Capo</label>
        <select id="capo-select"></select>
      </div>
      <div class="view-dropdown">
        <button id="btn-view-menu">View ▾</button>
        <div class="view-dropdown-content">
          <div class="dropdown-row">
            <label for="enharmonic-toggle">Note Display</label>
            <select id="enharmonic-toggle">
              <option value="sharp">Sharps (C#, F#)</option>
              <option value="flat">Flats (Db, Gb)</option>
            </select>
          </div>
          <div class="dropdown-row">
            <label for="mode-select">Mode</label>
            <select id="mode-select"></select>
          </div>
        </div>
      </div>
      <div class="control-group">
        <label for="instrument-select">Sound</label>
        <select id="instrument-select">
          <option value="acoustic">Acoustic</option>
          <option value="electric">Electric</option>
          <option value="nylon">Nylon</option>
          <option value="synth">Synth</option>
        </select>
      </div>
    </div>
    <div class="controls-center">
      <div class="control-group">
        <label for="bpm-input">BPM</label>
        <input type="number" id="bpm-input" min="40" max="240" value="120">
      </div>
      <div class="control-group">
        <label for="time-sig-select">Time Sig</label>
        <select id="time-sig-select">
          <option value="4/4">4/4</option>
          <option value="3/4">3/4</option>
          <option value="6/8">6/8</option>
          <option value="2/4">2/4</option>
        </select>
      </div>
      <div class="undo-redo-controls">
        <button id="btn-undo" title="Undo (Ctrl+Z)" disabled>&#8630;</button>
        <button id="btn-redo" title="Redo (Ctrl+Y)" disabled>&#8631;</button>
      </div>
      <div class="transport-controls">
        <button id="btn-play" title="Play">&#9654;</button>
        <button id="btn-pause" title="Pause">&#10074;&#10074;</button>
        <button id="btn-stop" title="Stop">&#9632;</button>
        <button id="btn-loop" title="Loop Section" class="toggle-btn">&#128257;</button>
      </div>
    </div>
    <div class="controls-right">
      <button id="btn-new">New</button>
      <button id="btn-save-as">Save As</button>
      <select id="load-select"><option value="">Load...</option></select>
      <button id="btn-import">Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
      <button id="btn-import-tab" class="btn-import-tab">Import Tab</button>
      <div class="share-dropdown">
        <button id="btn-share-menu">Share ▾</button>
        <div class="share-dropdown-content">
          <button id="btn-share">Share URL</button>
          <button id="btn-export">Export JSON</button>
          <button id="btn-export-midi">Export MIDI</button>
          <button id="btn-export-wav">Export WAV</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Mobile Tab Navigation -->
  <nav id="mobile-nav" class="mobile-only">
    <button class="mobile-tab" data-panel="chord-palette">Chords</button>
    <button class="mobile-tab active" data-panel="song-timeline">Timeline</button>
    <button class="mobile-tab" data-panel="chord-detail">Detail</button>
  </nav>

  <!-- Main 3-Panel Layout -->
  <main id="app-main">
    <!-- Left: Chord Palette -->
    <aside id="chord-palette">
      <h2>Chord Palette</h2>
      <div id="palette-chords"></div>
    </aside>

    <!-- Center: Song Timeline -->
    <section id="song-timeline">
      <div class="timeline-header">
        <h2>Song Timeline</h2>
        <div class="zoom-controls">
          <button id="btn-zoom-out" title="Zoom out (Ctrl+Scroll)">−</button>
          <span id="zoom-level">100%</span>
          <button id="btn-zoom-in" title="Zoom in (Ctrl+Scroll)">+</button>
        </div>
        <button id="btn-add-section">+ Add Section</button>
        <button id="btn-templates">Templates</button>
      </div>
      <div id="timeline-sections"></div>
    </section>

    <!-- Right: Chord Detail Panel -->
    <aside id="chord-detail">
      <h2>Chord Detail</h2>
      <div id="detail-chord-name"></div>
      <div id="detail-diagram"></div>
      <div id="detail-voicings">
        <h3>Alternative Voicings</h3>
        <div id="voicing-options"></div>
      </div>
      <div id="detail-suggestions">
        <h3>Suggested Next</h3>
        <div id="suggestion-list"></div>
      </div>
      <div id="theory-panel" class="theory-panel">
        <button id="btn-toggle-theory" class="theory-toggle-btn">
          Theory Analysis &#9662;
        </button>
        <div class="theory-panel-content">
          <div class="theory-scope-tabs">
            <button class="theory-tab active" data-scope="section">This Section</button>
            <button class="theory-tab" data-scope="song">Full Song</button>
          </div>
          <div id="theory-section-view" class="theory-view">
            <div class="theory-section-label"></div>
            <div id="theory-function-timeline"></div>
            <div id="theory-numerals"></div>
            <div id="theory-circle"></div>
          </div>
          <div id="theory-song-view" class="theory-view" style="display:none;">
            <div id="theory-song-summary"></div>
            <div id="theory-song-circle"></div>
          </div>
          <div id="theory-suggestions">
            <h4>Suggestions</h4>
            <div class="suggestion-type-tabs">
              <button class="sug-tab active" data-type="all">All</button>
              <button class="sug-tab" data-type="new-section">Sections</button>
              <button class="sug-tab" data-type="substitution">Subs</button>
              <button class="sug-tab" data-type="passing-chord">Passing</button>
              <button class="sug-tab" data-type="turnaround">Turnarounds</button>
              <button class="sug-tab" data-type="modulation">Modulation</button>
            </div>
            <div id="theory-suggestion-list"></div>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <!-- CDN Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/tonal/browser/tonal.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/svguitar/dist/svguitar.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>

  <!-- App Modules -->
  <script src="js/app.js"></script>
  <script src="js/theory.js?v=2"></script>
  <script src="js/chords-db.js"></script>
  <script src="js/diagrams.js"></script>
  <script src="js/tablature.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/chord-creator.js"></script>
  <script src="js/timeline.js?v=5"></script>
  <script src="js/controls.js"></script>
  <script src="js/theory-panel.js"></script>
  <script src="js/history.js"></script>
  <script src="js/audio.js?v=2"></script>
  <script src="js/midi-export.js"></script>
  <script src="js/audio-export.js"></script>
  <script src="js/importer.js?v=4"></script>
  <script src="js/sharing.js"></script>
  <script src="js/storage.js?v=2"></script>
</body>
</html>
